<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CASHFLOW</title>
<meta name="theme-color" content="#FFD600"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="CASHFLOW"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --main-bg: #FFD600;
  --text-color: #111;
  --border-color: #111;
  --card-bg: #fff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Space Mono',monospace;background:var(--main-bg);color:var(--text-color);min-height:100vh}
.app{max-width:420px;margin:0 auto;padding:14px 12px 90px}

/* top bar */
.top-bar{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.brand{font-size:11px;letter-spacing:.14em;font-weight:700}
.date-lbl{font-size:11px;letter-spacing:.06em}

/* cycle strip */
.cycle-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:10px;scrollbar-width:none}
.cycle-strip::-webkit-scrollbar{display:none}
.cpill{flex-shrink:0;border:2.5px solid var(--border-color);border-radius:99px;padding:5px 13px;font-size:11px;font-weight:700;cursor:pointer;background:#fff;font-family:'Space Mono',monospace}
.cpill.active{background:var(--border-color);color:var(--main-bg)}
.cpill.rent{border-color:#E24B4A}
.cpill.vac{border-color:#1D9E75}

/* real balance hero */
.hero-card{background:var(--card-bg);border:3px solid var(--border-color);padding:14px;margin-bottom:8px;color:#111}
.hero-label{font-size:10px;letter-spacing:.14em;font-weight:700;color:#888;margin-bottom:4px}
.real-num{font-size:40px;font-weight:700;line-height:1;margin-bottom:3px}
.real-num.pos{color:#111}
.real-num.warn{color:#BA7517}
.real-num.neg{color:#E8157A}
.hero-sub{font-size:11px;color:#888;margin-bottom:10px;display:flex;gap:12px}
.hero-sub b{color:#111}
.alert-bar{border:2px solid #E8157A;padding:7px 10px;font-size:11px;font-weight:700;color:#E8157A;margin-bottom:10px;display:none}
.alert-bar.show{display:block}
.two-chips{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.chip{border:2.5px solid var(--border-color);padding:10px 12px;color:#111}
.chip.cyan{background:#00E5FF}
.chip.pink{background:#E8157A;color:#fff}
.chip .cl{font-size:9px;letter-spacing:.1em;font-weight:700;margin-bottom:3px}
.chip .cv{font-size:17px;font-weight:700;line-height:1}
.chip .cs{font-size:10px;opacity:.75;margin-top:2px}
.bank-row{display:flex;align-items:center;gap:8px;border-top:2px solid var(--border-color);padding-top:10px}
.bank-label{font-size:10px;letter-spacing:.1em;font-weight:700;color:#888;flex:1}
.bank-input{border:2px solid var(--border-color);padding:6px 10px;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;width:110px;text-align:right;background:var(--card-bg);color:var(--text-color);outline:none}
.bank-input:focus{background:var(--main-bg)}

/* graph */
.graph-card{background:var(--card-bg);border:3px solid var(--border-color);padding:14px;margin-bottom:8px;color:#111}
.graph-label{font-size:10px;letter-spacing:.14em;font-weight:700;margin-bottom:8px}
.graph-wrap{position:relative;height:100px}

/* nav tabs */
.nav-tabs{display:flex;position:fixed;bottom:0;left:0;right:0;max-width:420px;margin:0 auto;border-top:3px solid var(--border-color);border-bottom:none;background:var(--main-bg);z-index:100}
.ntab{flex:1;padding:12px 4px 16px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.04em;cursor:pointer;text-align:center;border:none;background:transparent;border-right:2px solid var(--border-color);color:var(--text-color)}
.ntab:last-child{border-right:none}
.ntab.active{background:var(--border-color);color:var(--main-bg)}

/* tab panes */
.pane{display:none}
.pane.active{display:block}

/* bills */
.section-hdr{display:flex;justify-content:space-between;font-size:10px;letter-spacing:.12em;font-weight:700;color:var(--text-color);margin:0 0 6px}
.bill-item{background:var(--card-bg) !important;border:2.5px solid var(--border-color);padding:10px 12px;margin-bottom:5px;display:flex;align-items:center;gap:10px;color:#111}
.bill-item.is-paid{background:var(--card-bg) !important;opacity:0.5;border-style:dashed;border-color:var(--border-color)}
.bcheck{width:18px;height:18px;border:2.5px solid var(--border-color);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:11px;font-weight:700}
.bcheck.on{background:var(--border-color);color:var(--main-bg);border-color:var(--border-color)}
.binfo{flex:1;min-width:0}
.bname{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;flex-wrap:wrap;}
.bname.dim{color:#aaa}
.bmeta{font-size:10px;color:#999;letter-spacing:.04em;margin-top:1px}
.bamt{font-weight:700;font-size:13px;white-space:nowrap}
.bamt.flex-c{color:#7a3f00}
.bamt.dim{color:#aaa}
.amt-input{border:none;border-bottom:2px solid var(--border-color);background:transparent;font-family:Space Mono,monospace;font-size:13px;font-weight:700;width:64px;text-align:right;outline:none;padding:1px 2px}
.amt-input:focus{border-bottom:2px solid #E8157A;background:#FFF9C4}
.amt-input.flex-c{color:#7a3f00}
.amt-input.dim{color:#aaa}

/* projections */
.proj-item{background:var(--card-bg);border:2.5px solid var(--border-color);padding:12px;margin-bottom:6px;color:#111}
.proj-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.proj-title{font-size:13px;font-weight:700}
.proj-del{font-size:11px;color:#E8157A;cursor:pointer;font-weight:700;border:none;background:none;font-family:'Space Mono',monospace}
.proj-q{font-size:11px;color:#888;margin-bottom:6px;font-style:italic}
.proj-body{font-size:12px;line-height:1.6}
.proj-impact{font-size:11px;color:#BA7517;font-weight:700;margin-top:5px}
.proj-date{font-size:10px;color:#aaa;letter-spacing:.06em;margin-top:4px}
.save-btn{border:2.5px solid var(--border-color);background:var(--main-bg);padding:6px 12px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;margin-top:8px}
.save-btn:hover{background:var(--border-color);color:var(--main-bg)}
.empty-state{font-size:12px;color:#888;padding:20px 0;text-align:center}


/* bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--main-bg);border-top:3px solid var(--border-color);display:flex;max-width:420px;margin:0 auto}

/* Skipped / skip styles */
.skipped-badge {
  display: inline-block;
  font-size: 8px;
  background: var(--main-bg);
  color: var(--text-color);
  border: 1.5px solid var(--border-color);
  padding: 1px 4px;
  font-weight: 700;
  margin-left: 6px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.skipped-badge:hover {
  background: var(--border-color);
  color: var(--main-bg);
}
.bskip {
  background: transparent;
  border: none;
  font-size: 14px;
  cursor: pointer;
  padding: 0 4px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.bskip:hover {
  transform: scale(1.1);
}

.undo-toast {
  display: none;
  position: fixed;
  bottom: 75px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--border-color);
  color: var(--main-bg);
  border: 2.5px solid var(--border-color);
  padding: 10px 16px;
  z-index: 200;
  font-size: 12px;
  font-weight: 700;
  align-items: center;
  gap: 12px;
  box-shadow: 3px 3px 0 #000;
  max-width: 380px;
  width: calc(100% - 24px);
  justify-content: space-between;
}
.undo-btn {
  background: var(--main-bg);
  color: var(--text-color);
  border: 2px solid var(--border-color);
  padding: 3px 8px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
}
.undo-btn:hover {
  background: var(--border-color);
  color: var(--main-bg);
}
</style>
</head>
<body>
<div class="app">

<div class="top-bar">
  <span class="brand">CASHFLOW</span>
  <span class="date-lbl" id="date-lbl"></span>
</div>

<div class="cycle-strip" id="cycle-strip"></div>

<!-- HERO: Real Balance -->
<div class="hero-card">
  <div class="hero-label">REAL BALANCE <span id="cycle-badge" style="float:right;background:var(--main-bg);color:var(--text-color);padding:1px 7px;font-size:10px;letter-spacing:.1em;font-weight:700">—</span></div>
  <div class="real-num pos" id="real-num">—</div>
  <div class="hero-sub">
    <span>BANK <b id="display-bank">—</b></span>
    <span>BILLS DUE <b id="display-bills">—</b></span>
  </div>
  <div class="alert-bar" id="alert-bar">—</div>
  <div class="two-chips">
    <div class="chip cyan">
      <div class="cl">SAFE TODAY</div>
      <div class="cv" id="chip-safe">—</div>
      <div class="cs" id="chip-safe-note">per day, fixed bills aside</div>
    </div>
    <div class="chip pink">
      <div class="cl">NEXT PAY</div>
      <div class="cv" id="chip-nextpay">—</div>
      <div class="cs" id="chip-days">—</div>
    </div>
  </div>
  <div class="bank-row">
    <span class="bank-label">UPDATE BANK BALANCE</span>
    <input class="bank-input" type="number" id="bank-input" placeholder="$0.00" />
  </div>
</div>

<!-- PROJECTION CHART -->
<div class="graph-card">
  <div class="graph-label">6-PERIOD PROJECTION</div>
  <div class="graph-wrap">
    <canvas id="proj-chart" role="img" aria-label="6-period projected closing balance">Loading chart.</canvas>
  </div>
</div>

<!-- TABS -->
<!-- TODAY TAB -->
<div class="pane active" id="pane-today">
  <div class="section-hdr">
    <span>THIS CYCLE — BILLS</span>
    <span id="remaining-count">—</span>
  </div>
  <div id="bill-list-today"></div>

</div>

<!-- BILLS TAB -->
<div class="pane" id="pane-bills">
  <div class="section-hdr">
    <span>ALL BILLS — PAID</span>
    <span id="paid-count">—</span>
  </div>
  <div id="bill-list-paid"></div>
</div>

<!-- SETTINGS TAB -->
<div class="pane" id="pane-settings">
  <div class="section-hdr">
    <span>SETTINGS</span>
  </div>
  
  <div style="background:var(--card-bg);border:2.5px solid var(--border-color);padding:14px;margin-bottom:8px;color:var(--text-color);box-shadow:3px 3px 0 #000;">
    <div style="font-size:10px;font-weight:700;letter-spacing:0.1em;margin-bottom:12px;text-transform:uppercase;color:var(--text-color);">SELECT THEME COLOR</div>
    <div id="settings-theme-list" style="display:grid;grid-template-columns:repeat(2, 1fr);gap:10px;">
      <!-- Theme swatches cards will be generated here -->
    </div>
  </div>
</div>

<!-- SIMULATE TAB REMOVED -->

<div class="nav-tabs">
  <button class="ntab active" onclick="switchTab('today')">TODAY</button>
  <button class="ntab" onclick="switchTab('bills')">BILLS</button>
  <button class="ntab" onclick="switchTab('settings')">SETTINGS</button>
  <button class="ntab" onclick="shiftCycle(-1)">← PREV</button>
  <button class="ntab" onclick="shiftCycle(1)">NEXT →</button>
</div>

<!-- Undo toast wrapper -->
<div id="undo-toast" class="undo-toast">
  <span id="undo-toast-text"></span>
  <button id="undo-toast-btn" class="undo-btn">UNDO</button>
</div>
</div>

function parseLocalDate(dateStr) {
  const [year, month, day] = dateStr.split('-').map(Number);
  return new Date(year, month - 1, day);
}

const THEMES = {
  yellow: { bg: '#FFD600', text: '#111', border: '#111', card: '#fff' },
  cyan: { bg: '#00E5FF', text: '#111', border: '#111', card: '#fff' },
  green: { bg: '#00E676', text: '#111', border: '#111', card: '#fff' },
  pink: { bg: '#E8157A', text: '#fff', border: '#111', card: '#fff' },
  orange: { bg: '#FF6D00', text: '#111', border: '#111', card: '#fff' },
  bw: { bg: '#ffffff', text: '#111', border: '#111', card: '#fff' }, // Basic Black & White
  inverted: { bg: '#111111', text: '#fff', border: '#fff', card: '#111111' }, // Inverted Dark
  dark: { bg: '#1a1a1a', text: '#eee', border: '#eee', card: '#262626' } // Charcoal Dark
};

function applyTheme(themeKey) {
  const theme = THEMES[themeKey] || THEMES.yellow;
  document.documentElement.style.setProperty('--main-bg', theme.bg);
  document.documentElement.style.setProperty('--text-color', theme.text);
  document.documentElement.style.setProperty('--border-color', theme.border);
  document.documentElement.style.setProperty('--card-bg', theme.card);
  
  // Update meta theme color
  let metaTheme = document.querySelector('meta[name="theme-color"]');
  if (metaTheme) metaTheme.setAttribute('content', theme.bg);
  
  S.theme = themeKey;
  saveState();
}

function buildSettingsThemes() {
  const container = document.getElementById('settings-theme-list');
  if (!container) return;
  container.innerHTML = '';
  
  Object.keys(THEMES).forEach(key => {
    const theme = THEMES[key];
    const card = document.createElement('div');
    card.style.background = theme.card;
    card.style.color = theme.text;
    card.style.border = '2.5px solid ' + theme.border;
    card.style.padding = '12px 10px';
    card.style.cursor = 'pointer';
    card.style.fontFamily = "'Space Mono', monospace";
    card.style.fontSize = '11px';
    card.style.fontWeight = '700';
    card.style.textAlign = 'center';
    card.style.textTransform = 'uppercase';
    card.style.display = 'flex';
    card.style.flexDirection = 'column';
    card.style.alignItems = 'center';
    card.style.gap = '6px';
    card.style.boxShadow = S.theme === key ? 'inset 0 0 0 2px ' + theme.border : '3px 3px 0 #000';
    
    if (S.theme === key) {
      card.style.borderColor = 'var(--border-color)';
      card.style.background = 'var(--border-color)';
      card.style.color = 'var(--main-bg)';
    }

    const title = document.createElement('span');
    title.textContent = (S.theme === key ? '✓ ' : '') + key;
    
    // Mini colors preview
    const preview = document.createElement('div');
    preview.style.display = 'flex';
    preview.style.gap = '4px';
    
    const dot1 = document.createElement('div');
    dot1.style.width = '10px';
    dot1.style.height = '10px';
    dot1.style.borderRadius = '50%';
    dot1.style.background = theme.bg;
    dot1.style.border = '1px solid ' + (key === 'inverted' ? '#fff' : '#111');
    
    const dot2 = document.createElement('div');
    dot2.style.width = '10px';
    dot2.style.height = '10px';
    dot2.style.borderRadius = '50%';
    dot2.style.background = theme.card;
    dot2.style.border = '1px solid ' + (key === 'inverted' ? '#fff' : '#111');

    preview.appendChild(dot1);
    preview.appendChild(dot2);
    
    card.appendChild(title);
    card.appendChild(preview);
    
    card.onclick = () => {
      applyTheme(key);
      buildSettingsThemes();
      buildChart();
    };
    
    container.appendChild(card);
  });
}

function getActiveCycleIndex() {
  const now = new Date(); now.setHours(0,0,0,0);
  for (let i = 0; i < periods.length; i++) {
    const start = parseLocalDate(periods[i].startDateStr);
    const end = parseLocalDate(periods[i].nextPayDate);
    if (now >= start && now < end) {
      return i;
    }
  }
  if (now < parseLocalDate(periods[0].startDateStr)) return 0;
  return periods.length - 1;
}

function autoSweepUnpaidBills() {
  const activeIdx = getActiveCycleIndex();
  let movedAny = false;
  for (let i = 0; i < activeIdx; i++) {
    const pastPeriod = S.periods[i];
    for (let j = pastPeriod.bills.length - 1; j >= 0; j--) {
      const bill = pastPeriod.bills[j];
      if (!bill.paid) {
        if (bill.originalCycleIndex === undefined) {
          bill.originalCycleIndex = i;
        }
        pastPeriod.bills.splice(j, 1);
        S.periods[activeIdx].bills.push(bill);
        movedAny = true;
      }
    }
  }
  if (movedAny) {
    saveState();
  }
}

/* ── STATE ── */
let S = {
  bank: 1790,
  selected: 0,
  periods: [],
  savedProjections: [],
  theme: 'yellow'
};

function deepCopyPeriods() {
  return JSON.parse(JSON.stringify(periods));
}

function loadState(){
  try{
    const s=localStorage.getItem('cf-v1');
    if(s){
      const p=JSON.parse(s);
      S.bank=p.bank!==undefined?p.bank:1790;
      S.selected=p.selected!==undefined?p.selected:0;
      S.savedProjections=p.savedProjections||[];
      S.theme=p.theme||'yellow';
      
      if(p.periods){
        S.periods=p.periods;
      } else {
        // Migrate from old paidMap and billAmts format
        S.periods=deepCopyPeriods();
        if(p.paidMap){
          p.paidMap.forEach((pa,pi)=>{
            if(S.periods[pi]){
              pa.forEach((paidVal,bi)=>{
                if(S.periods[pi].bills[bi]){
                  S.periods[pi].bills[bi].paid=paidVal;
                }
              });
            }
          });
        }
        if(p.billAmts){
          p.billAmts.forEach((pa,pi)=>{
            if(S.periods[pi]){
              pa.forEach((amt,bi)=>{
                if(S.periods[pi].bills[bi]){
                  S.periods[pi].bills[bi].amt=amt;
                }
              });
            }
          });
        }
      }
    } else {
      S.periods=deepCopyPeriods();
      S.selected=getActiveCycleIndex();
    }
  }catch(e){
    S.periods=deepCopyPeriods();
    S.selected=0;
  }
}

function saveState(){
  localStorage.setItem('cf-v1', JSON.stringify({
    bank: S.bank,
    periods: S.periods,
    savedProjections: S.savedProjections,
    selected: S.selected,
    theme: S.theme
  }));
}

loadState();
autoSweepUnpaidBills();

/* ── MATH (Note$ logic) ──
   real = bank - unpaid bills THIS cycle
   safe = real / days until next pay
   Projection per period = PAY - total bills that period
*/
function unpaidBills(i){
  return S.periods[i].bills.reduce((s,b)=> b.paid ? s : s+b.amt, 0);
}
function totalBills(i){
  return S.periods[i].bills.reduce((s,b)=> s+b.amt, 0);
}

/* Projected starting bank for any cycle:
   cycle 0 = real S.bank (current actual balance)
   cycle N = PAY only (fresh start, assume previous cycle spent down to zero) */
function projectedBank(i){
  if(i === 0) return S.bank;
  return PAY;
}

function real(){ return projectedBank(S.selected) - unpaidBills(S.selected); }

function daysUntilPay(){
  const now = new Date(); now.setHours(0,0,0,0);
  const np = parseLocalDate(S.periods[S.selected].nextPayDate);
  // Calculate absolute difference in days between Today and Next Pay
  return Math.max(Math.abs(Math.round((np - now) / 86400000)), 1);
}

function safePerDay(){
  const bank = projectedBank(S.selected);
  const fixedThisCycle = S.periods[S.selected].bills
    .filter(b => b.type === 'fixed')
    .reduce((s,b) => s + b.amt, 0);
  const afterFixed = bank - fixedThisCycle;
  if(afterFixed <= 0) return 0;
  return afterFixed / daysUntilPay();
}

function calcProjectionNets(){
  /* Period 0: closing = bank - unpaidBills (current cycle, actual balance)
     Period N: closing = PAY - totalBills (fresh start, no carryover) */
  return S.periods.map((p,i) => {
    if(i === 0) return Math.round(S.bank - unpaidBills(0));
    return Math.round(PAY - totalBills(i));
  });
}

function $n(n){ return (n<0?'-$':'$')+Math.abs(Math.round(n)).toLocaleString(); }
function amtCls(n){ return n>=200?'pos':n>=0?'warn':'neg'; }

/* ── STRIP ── */
function buildStrip(){
  const el=document.getElementById('cycle-strip');
  el.innerHTML='';
  S.periods.forEach((p,i)=>{
    const d=document.createElement('div');
    let cls='cpill'+(p.rent?' rent':p.vac?' vac':'')+(i===S.selected?' active':'');
    d.className=cls; d.textContent=(i+1)+' · '+p.label;
    d.onclick=()=>{ S.selected=i; saveState(); refresh(); };
    el.appendChild(d);
  });
  
  // Center active pill in horizontally scrolling strip
  setTimeout(() => {
    const active = el.querySelector('.cpill.active');
    if (active) {
      active.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'center' });
    }
  }, 50);
}

/* ── HERO ── */
function buildHero(){
  const r=real(), sf=safePerDay();
  const ub=unpaidBills(S.selected);
  const pb=projectedBank(S.selected);
  document.getElementById('cycle-badge').textContent = 'CYCLE '+(S.selected+1)+'/'+S.periods.length;
  document.getElementById('real-num').textContent=$n(r);
  document.getElementById('real-num').className='real-num '+amtCls(r);
  document.getElementById('display-bank').textContent=S.selected===0?$n(S.bank):$n(pb)+' proj.';
  document.getElementById('display-bills').textContent=$n(ub);
  document.getElementById('bank-input').value=S.bank;

  const alert=document.getElementById('alert-bar');
  if(r<0){ alert.textContent=$n(Math.abs(r))+' SHORT — BILLS EXCEED BALANCE'; alert.className='alert-bar show'; }
  else if(r<200){ alert.textContent='LOW BUFFER — ONLY '+$n(r)+' AFTER BILLS'; alert.className='alert-bar show'; }
  else{ alert.className='alert-bar'; }

  document.getElementById('chip-safe').textContent=$n(sf);
  document.getElementById('chip-nextpay').textContent=S.periods[S.selected].nextPay;

  // Custom days remaining calculation with past/future suffix
  const now = new Date(); now.setHours(0,0,0,0);
  const np = parseLocalDate(S.periods[S.selected].nextPayDate);
  const diffDays = Math.round((np - now) / 86400000);
  const absDays = Math.abs(diffDays);
  let suffix = diffDays < 0 ? ' ago' : ' away';
  let daysStr = '';
  if (diffDays === 0) {
    daysStr = 'today';
  } else {
    daysStr = absDays + ' day' + (absDays === 1 ? '' : 's') + suffix;
  }
  document.getElementById('chip-days').textContent=daysStr;
}

/* ── CHART ── */
let chart=null;
function buildChart(){
  const nets=calcProjectionNets();
  const colors=nets.map(n=>n>=500?'#3B6D11':n>=0?'#BA7517':'#E24B4A');
  const ctx=document.getElementById('proj-chart').getContext('2d');
  if(chart) chart.destroy();

  const isDark = S.theme === 'dark' || S.theme === 'inverted';
  const tickColor = isDark ? '#eee' : '#444';
  const borderColor = isDark ? '#eee' : '#111';

  chart=new Chart(ctx,{
    type:'bar',
    data:{
      labels:S.periods.map(p=>p.label),
      datasets:[{data:nets,backgroundColor:colors,borderColor:borderColor,borderWidth:2,borderRadius:0}]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'$'+c.parsed.y.toLocaleString()}}},
      scales:{
        x:{ticks:{font:{family:'Space Mono',size:10},color:tickColor,autoSkip:false,maxRotation:0},grid:{display:false},border:{color:borderColor,width:2}},
        y:{ticks:{font:{family:'Space Mono',size:10},color:isDark ? '#aaa' : '#888',callback:v=>'$'+v},grid:{color:isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)'},border:{display:false},beginAtZero:false}
      }
    }
  });
}

/* ── BILLS TODAY ── */
function buildBillsToday(){
  const p=S.periods[S.selected];
  const el=document.getElementById('bill-list-today');
  el.innerHTML='';
  const unpaid=p.bills.filter(b=>!b.paid).length;
  document.getElementById('remaining-count').textContent=unpaid+' REMAINING';
  p.bills.forEach((b,j)=>{
    const isPaid=b.paid;
    const d=document.createElement('div');
    d.className='bill-item'+(isPaid?' is-paid':'');
    const amtCls='amt-input'+(b.type==='flex'?' flex-c':'')+(isPaid?' dim':'');

    // Skipped tag logic
    const isSkipped = b.originalCycleIndex !== undefined && b.originalCycleIndex !== S.selected;
    const skippedTag = isSkipped ? `<span class="skipped-badge" onclick="event.stopPropagation(); revertBill(${S.selected}, ${j})">Skipped ↩</span>` : '';

    d.innerHTML=`
      <div class="bcheck${isPaid?' on':''}" onclick="togglePaid(${S.selected},${j})">${isPaid?'✓':''}</div>
      <div class="binfo">
        <div class="bname${isPaid?' dim':''}">${b.name}${skippedTag}</div>
        <div class="bmeta">${b.due}${b.type==='flex'?' · FLEXIBLE':''}</div>
      </div>
      <input class="${amtCls}" type="number" value="${b.amt}" min="0" step="1"
        onchange="updateAmt(${S.selected},${j},this.value)"
        onclick="this.select()" />
      ${!isPaid && S.selected < S.periods.length - 1 ? `<button class="bskip" onclick="event.stopPropagation(); manualSkipBill(${S.selected}, ${j})" title="Skip to next cycle">⏭️</button>` : ''}
    `;
    el.appendChild(d);
  });
}

/* ── BILLS PAID TAB ── */
function buildBillsPaid(){
  const el=document.getElementById('bill-list-paid');
  el.innerHTML='';
  let paidCount=0;
  S.periods.forEach((p,pi)=>{
    p.bills.forEach((b,bi)=>{
      if(b.paid){
        paidCount++;
        const d=document.createElement('div');
        d.className='bill-item is-paid';
        d.innerHTML=`
          <div class="bcheck on" onclick="togglePaid(${pi},${bi})">✓</div>
          <div class="binfo">
            <div class="bname dim">${b.name}</div>
            <div class="bmeta">${p.label} · ${b.due}</div>
          </div>
          <div class="bamt dim">$${b.amt}</div>`;
        el.appendChild(d);
      }
    });
  });
  document.getElementById('paid-count').textContent=paidCount+' PAID';
  if(paidCount===0) el.innerHTML='<div class="empty-state">Nothing marked paid yet.</div>';
}

window.togglePaid=function(pi,bi){
  const bill = S.periods[pi].bills[bi];
  bill.paid = !bill.paid;
  
  if (bill.paid && bill.originalCycleIndex !== undefined && bill.originalCycleIndex !== pi) {
    const origIdx = bill.originalCycleIndex;
    delete bill.originalCycleIndex;
    S.periods[pi].bills.splice(bi, 1);
    S.periods[origIdx].bills.push(bill);
  }
  
  saveState();
  buildHero();
  buildBillsToday();
  if (currentTab === 'bills') buildBillsPaid();
  buildChart();
};

window.updateAmt=function(pi,bi,val){
  const v=parseFloat(val);
  if(isNaN(v)||v<0) return;
  S.periods[pi].bills[bi].amt=Math.round(v);
  saveState();
  buildHero();
  buildChart();
  document.getElementById('remaining-count').textContent=
    S.periods[pi].bills.filter(b=>!b.paid).length+' REMAINING';
};

/* ── MANUAL SKIP & REVERT ── */
window.manualSkipBill = function(pi, bi) {
  if (pi >= S.periods.length - 1) return;
  const targetPi = pi + 1;
  moveBill(pi, bi, targetPi, true);
};

function moveBill(fromPeriodIdx, billIdx, toPeriodIdx, isManual = false) {
  const bill = S.periods[fromPeriodIdx].bills[billIdx];
  if (bill.originalCycleIndex === undefined) {
    bill.originalCycleIndex = fromPeriodIdx;
  }
  S.periods[fromPeriodIdx].bills.splice(billIdx, 1);
  S.periods[toPeriodIdx].bills.push(bill);
  saveState();
  refresh();
  if (currentTab === 'bills') buildBillsPaid();
  buildChart();
  
  if (isManual) {
    showUndoToast(bill, fromPeriodIdx, toPeriodIdx);
  }
}

let lastSkippedInfo = null;
let undoTimeout = null;

function showUndoToast(bill, fromPeriodIdx, toPeriodIdx) {
  lastSkippedInfo = { bill, fromPeriodIdx, toPeriodIdx };
  const toast = document.getElementById('undo-toast');
  const toastText = document.getElementById('undo-toast-text');
  const targetLabel = S.periods[toPeriodIdx].label;
  toastText.textContent = `Skipped "${bill.name}" to ${targetLabel}`;
  toast.style.display = 'flex';
  
  if (undoTimeout) clearTimeout(undoTimeout);
  undoTimeout = setTimeout(() => {
    toast.style.display = 'none';
    lastSkippedInfo = null;
  }, 5000);
}

window.undoLastSkip = function() {
  if (!lastSkippedInfo) return;
  const { bill, fromPeriodIdx, toPeriodIdx } = lastSkippedInfo;
  const idx = S.periods[toPeriodIdx].bills.indexOf(bill);
  if (idx !== -1) {
    S.periods[toPeriodIdx].bills.splice(idx, 1);
    if (bill.originalCycleIndex === fromPeriodIdx) {
      delete bill.originalCycleIndex;
    }
    S.periods[fromPeriodIdx].bills.push(bill);
    saveState();
    refresh();
    if (currentTab === 'bills') buildBillsPaid();
    buildChart();
  }
  document.getElementById('undo-toast').style.display = 'none';
  lastSkippedInfo = null;
  if (undoTimeout) clearTimeout(undoTimeout);
};

window.revertBill = function(pi, bi) {
  const bill = S.periods[pi].bills[bi];
  const origIdx = bill.originalCycleIndex;
  if (origIdx === undefined) return;
  delete bill.originalCycleIndex;
  S.periods[pi].bills.splice(bi, 1);
  S.periods[origIdx].bills.push(bill);
  saveState();
  refresh();
  if (currentTab === 'bills') buildBillsPaid();
  buildChart();
};

/* ── TABS ── */
let currentTab='today';
window.switchTab=function(t){
  currentTab=t;
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+t).classList.add('active');
  const tabs=['today','bills','settings'];
  const idx = tabs.indexOf(t);
  if(idx !== -1) {
    document.querySelectorAll('.ntab')[idx].classList.add('active');
  }
  if(t==='bills') buildBillsPaid();
  if(t==='settings') buildSettingsThemes();
};

/* ── BANK INPUT ── */
document.getElementById('bank-input').addEventListener('change',function(){
  const v=parseFloat(this.value);
  if(!isNaN(v)){ S.bank=v; saveState(); refresh(); }
});

/* ── SHIFT CYCLE ── */
window.shiftCycle = function(dir){
  const next = S.selected + dir;
  if(next < 0 || next >= S.periods.length) return;
  S.selected = next;
  saveState();
  refresh();
  switchTab('today');
};

function updateCycleNav(){
  const tabs = document.querySelectorAll('.ntab');
  const prevBtn = tabs[3], nextBtn = tabs[4];
  if(!prevBtn || !nextBtn) return;
  prevBtn.style.opacity = S.selected === 0 ? '0.3' : '1';
  prevBtn.style.pointerEvents = S.selected === 0 ? 'none' : 'auto';
  nextBtn.style.opacity = S.selected === S.periods.length - 1 ? '0.3' : '1';
  nextBtn.style.pointerEvents = S.selected === S.periods.length - 1 ? 'none' : 'auto';
}

/* ── MAIN REFRESH ── */
function refresh(){
  buildStrip();
  buildHero();
  buildBillsToday();
  updateCycleNav();
}

// Dynamic date label
(function(){
  const now = new Date();
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('date-lbl').textContent =
    days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();
})();

applyTheme(S.theme);
buildSettingsThemes();

document.getElementById('undo-toast-btn').onclick = function() {
  undoLastSkip();
};

buildChart();
refresh();

// PWA service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js')
    .then(()=>console.log('SW registered'))
    .catch(e=>console.log('SW failed:',e));
}
